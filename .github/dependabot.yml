version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # React 19 migration handled manually; react/react-dom must bump together.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      # Redux Toolkit v2 removed createReducer object notation; migrate reducers first.
      - dependency-name: "@reduxjs/toolkit"
        update-types: ["version-update:semver-major"]
      # vite 8 + rolldown breaks CJS default-export interop for several deps; stay on 7.x.
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      # recharts v3 reshaped Tooltip payload (PieChart legendKey access broke); stay on 2.x.
      - dependency-name: "recharts"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "dev"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Seoul"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
